name: Update Openings Database

on:
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 06:00 UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update-openings:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'

      - name: Regenerate openings database
        run: go generate ./...

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet openings_gen.go; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected in generated openings"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected in generated openings:"
            git diff --stat openings_gen.go
          fi

      - name: Run tests
        if: steps.changes.outputs.has_changes == 'true'
        run: go test -race ./...

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          branch: auto/update-openings
          commit-message: 'Update chess openings database from lichess-org/chess-openings'
          title: 'Update chess openings database'
          body: |
            Automated update of the chess openings database from [lichess-org/chess-openings](https://github.com/lichess-org/chess-openings).

            This PR was created automatically by the scheduled workflow.
          labels: dependencies
          delete-branch: true
